<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>쿵푸 호랑이 총알 피하기 (Mobile)</title>
  <meta name="description" content="모바일 전용! 쿵푸 호랑이와 함께 총알을 피하며 생존하세요. 터치 조작으로 즐기는 아케이드 게임.">
  <!-- 모바일 웹앱 메타 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a12">
  <meta name="screen-orientation" content="portrait">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐯</text></svg>">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-wrapper">

    <!-- 상단 바 (HUD + 사운드/일시정지) -->
    <div id="top-bar">
      <div id="game-hud">
        <div class="hud-item">
          <span class="hud-label">생존</span>
          <span id="hud-time" class="hud-val">00:00.00</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">최고</span>
          <span id="hud-best" class="hud-val">00:00.00</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="btn-pause-game" class="icon-btn hidden" aria-label="일시정지">⏸</button>
        <button id="btn-sound-toggle" class="icon-btn" aria-label="음소거 토글">
          <span id="sound-icon">🔊</span>
        </button>
      </div>
    </div>

    <!-- 메인 컨테이너 -->
    <main id="app-container">

      <!-- 1. 시작 화면 -->
      <section id="screen-start" class="screen active">
        <div class="title-container">
          <span class="emoji-badge">🐯</span>
          <h1 id="main-title" class="neon-text">KUNG FU TIGER</h1>
          <h2 id="sub-title">총알 피하기</h2>
        </div>

        <div class="character-preview">
          <img src="assets/svg/tiger.svg" alt="쿵푸 호랑이" class="floating-img">
        </div>

        <div class="menu-buttons">
          <button id="btn-start-game" class="btn btn-primary btn-glow">수련 시작</button>
          <button id="btn-show-ranking" class="btn btn-secondary">명예의 전당</button>
        </div>

        <div class="instructions-card">
          <h3>조작법</h3>
          <div class="controls-guide">
            <div class="control-item">
              <span class="touch-icon">←</span>
              <span class="touch-icon">→</span>
              <span class="control-desc">좌우 이동</span>
            </div>
            <div class="control-item">
              <span class="touch-icon">⬆</span>
              <span class="control-desc">점프 (2단)</span>
            </div>
            <div class="control-item">
              <span class="touch-icon">⬇</span>
              <span class="control-desc">숙이기</span>
            </div>
          </div>
        </div>

        <p id="game-footer-inline">&copy; 2026 Kung Fu Tiger Mobile</p>
      </section>

      <!-- 2. 게임 플레이 화면 -->
      <section id="screen-game" class="screen">
        <div id="canvas-container">
          <canvas id="game-canvas"></canvas>
        </div>
      </section>

      <!-- 3. 랭킹 보드 화면 -->
      <section id="screen-ranking" class="screen">
        <h2 class="neon-text">명예의 전당</h2>

        <div class="ranking-board-container">
          <table id="ranking-table">
            <thead>
              <tr>
                <th scope="col">순위</th>
                <th scope="col">이름</th>
                <th scope="col">생존 시간</th>
                <th scope="col">등록일</th>
              </tr>
            </thead>
            <tbody id="ranking-list-body"></tbody>
          </table>

          <div id="no-rankings" class="hidden">
            <p>아직 등록된 기록이 없습니다. 첫 번째 영웅이 되어보세요!</p>
          </div>
        </div>

        <div class="menu-buttons">
          <button id="btn-back-to-menu" class="btn btn-secondary">메인으로</button>
          <button id="btn-reset-rankings" class="btn btn-danger-text">기록 초기화</button>
        </div>
      </section>

    </main>

    <!-- 터치 가상 패드 (게임 중에만 표시) -->
    <div id="touch-pad">
      <div class="dpad-group">
        <button id="btn-touch-left" class="touch-btn" data-action="left" aria-label="왼쪽 이동">◀</button>
        <button id="btn-touch-right" class="touch-btn" data-action="right" aria-label="오른쪽 이동">▶</button>
      </div>
      <div class="action-group">
        <button id="btn-touch-duck" class="touch-btn touch-btn-duck" data-action="duck" aria-label="숙이기">▼</button>
        <button id="btn-touch-jump" class="touch-btn touch-btn-jump" data-action="jump" aria-label="점프">JUMP</button>
      </div>
    </div>

    <!-- 일시정지 오버레이 -->
    <div id="overlay-pause" class="overlay hidden">
      <div class="overlay-content">
        <h2 class="overlay-title neon-text">수련 일시정지</h2>
        <p class="overlay-desc">호랑이가 잠시 숨을 고르고 있습니다.</p>
        <div class="overlay-buttons">
          <button id="btn-resume" class="btn btn-primary">계속하기</button>
          <button id="btn-restart-paused" class="btn btn-secondary">다시 시작</button>
          <button id="btn-quit-paused" class="btn btn-danger">메인으로</button>
        </div>
      </div>
    </div>

    <!-- 게임오버 오버레이 -->
    <div id="overlay-gameover" class="overlay hidden">
      <div class="overlay-content">
        <h2 class="overlay-title glitch-text" data-text="GAME OVER">GAME OVER</h2>

        <div class="score-display">
          <span class="score-label">최종 생존 시간</span>
          <span id="final-time" class="score-value">00:00.00</span>
          <div id="new-record-badge" class="badge hidden">NEW RECORD!</div>
        </div>

        <div id="ranking-form-container">
          <p>명예의 전당에 이름을 새기세요!</p>
          <div class="input-group">
            <input type="text" id="player-name-input" maxlength="8" placeholder="이름 입력 (최대 8자)" autocomplete="off" enterkeyhint="done">
            <button id="btn-submit-score" class="btn btn-primary" style="width:auto;padding:10px 16px;">등록</button>
          </div>
        </div>

        <div class="overlay-buttons">
          <button id="btn-restart-over" class="btn btn-primary">다시 하기</button>
          <button id="btn-quit-over" class="btn btn-secondary">메인으로</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="js/main.js"></script>
  <script>
    // Service Worker 등록
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
