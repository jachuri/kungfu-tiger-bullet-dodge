<svg viewBox="0 0 50 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 불타는 듯한 수평 총알 그라데이션 -->
    <linearGradient id="bulletGradH" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="20%" stop-color="#FFEB3B" />
      <stop offset="60%" stop-color="#FF3D00" />
      <stop offset="100%" stop-color="#D500F9" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- 에너지 탄환 몸체와 불꽃 잔상 -->
  <path d="M 50,10 C 40,5 25,4 0,7 C 12,9 12,11 0,13 C 25,16 40,15 50,10 Z" fill="url(#bulletGradH)" />
  <!-- 내부 코어 섬광 -->
  <ellipse cx="40" cy="10" rx="8" ry="3.5" fill="#FFFFFF" />
  <!-- 작은 스파크 파티클 -->
  <circle cx="20" cy="8" r="1.5" fill="#FFEB3B" opacity="0.8" />
  <circle cx="15" cy="13" r="1" fill="#FF3D00" opacity="0.6" />
</svg>
